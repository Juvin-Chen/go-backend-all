<!DOCTYPE html>
<html>

<head>
    <title>登录</title>
</head>

<body>
    <h1>登录</h1>
    {{if .Error}}
    <p style="color:red">{{.Error}}</p>
    {{end}}
    <form action="/login/submit" method="POST">
        <div>
            <label>用户名：</label>
            <input type="text" name="username" value="{{.Username}}">
        </div>
        <div>
            <label>密码：</label>
            <input type="password" name="password">
        </div>
        <button type="submit">登录</button>
    </form>
</body>

</html>
